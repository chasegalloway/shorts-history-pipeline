channel:
  niche: "dark history & disasters"
  timezone: "America/New_York"

paths:
  ffmpeg: "C:/Users/chase/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-8.1.2-full_build/bin/ffmpeg.exe"
  ffprobe: "C:/Users/chase/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-8.1.2-full_build/bin/ffprobe.exe"
  output: "output"
  music: "assets/music"
  db: "channel.db"

script:
  model: "sonnet"          # claude CLI model for script generation
  words_min: 170          # ~65-70s narration; floor keeps every video >60s for TikTok Creator Rewards
  words_max: 190

tts:
  engine: "kokoro"          # kokoro | edge
  voice: "am_michael"       # kokoro voice id
  edge_voice: "en-US-AndrewNeural"
  speed: 1.05

captions:
  font: "Arial Black"
  font_size: 88             # at 1080x1920 playres
  max_words_per_chunk: 3

video:
  width: 1080
  height: 1920
  fps: 30
  max_seconds: 90         # informational warn threshold; target ~65s, YT Shorts cap is 180s
  images_min: 5
  images_target: 10
  music_volume: 0.35        # pre-duck music level (0-1)

whisper:
  model: "small"            # tiny | base | small
  device: "cpu"
  compute_type: "int8"

upload:
  enabled: true
  privacy: "private"        # stays private-locked until API audit passes anyway
  category_id: "27"         # Education
  publish_times: ["10:00", "13:00", "16:00", "20:00", "23:00", "02:00"]   # 3 daytime (10:00-16:00 ET) + 3 overnight (20:00-02:00 ET)
  made_for_kids: false
  paid_promotion: false            # set true for videos using paid sound-campaign tracks
  synthetic_media_disclosure: false # real archival photos + generic AI narration don't meet YT's disclosure criteria

tiktok:
  enabled: true
  method: "browser"                 # browser (Studio web, real session) | api (tiktok.py, audit-locked to SELF_ONLY)
  browser_profile: "browser-profile"  # persistent Edge profile holding the logged-in TikTok session
  browser_channel: "msedge"
  headless: false                   # TikTok blocks headless; runs visibly in the logged-in session
  match_youtube_schedule: true      # schedule the TikTok post for the same time as the YT slot
  privacy_level: "SELF_ONLY"        # api method only — forced private until the TikTok app passes audit
  disable_comment: false
  disable_duet: false
  disable_stitch: false
  disclose_commercial: false        # matches paid_promotion / synthetic-media stance
